# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
  border_size = 1
  # Multi-stop gradient so the rotating borderangle animation reads as a sweep;
  # brighter middle stop = more glow
  col.active_border = rgba(ffffffff) rgba(ffffff99) rgba(ffffffff) 45deg
  col.inactive_border = rgba(ffffff22) rgba(ffffff08) 0deg
}

# Make windows a little more opaque than the omarchy default (0.97/0.9) for contrast
windowrule = opacity 1.0 0.95, match:tag default-opacity

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
  rounding = 10
  rounding_power = 3.0
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
  bezier = borderRotate, 0, 0, 1, 1
  animation = border, 1, 5.0, water
  # `loop` makes the gradient angle rotate continuously for an animated border
  animation = borderangle, 1, 50, borderRotate, loop
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}
