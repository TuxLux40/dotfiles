# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Both displays are 1x-class (1440p 32" + small hi-dpi panel), so render GTK at 1x.
env = GDK_SCALE,1

# Primary (first): Acer EB321HQU 32" 1440p at native res, 1x scale, top-left origin.
monitor = DP-3, 2560x1440@60, 0x0, 1

# Secondary (second): Soogeen L01N8A ~7.8" panel. Native scan is portrait (800x1280)
# but the panel is physically landscape, so transform,1 rotates it 90 to a wide
# 1280x800. Scale 1.0 -> full 1280x800 logical px so app UIs (e.g. Proton Mail)
# don't overflow. Bump toward 1.25 (1024x640) if the UI feels too small. Right of Acer.
monitor = HDMI-A-1, 800x1280@60, 2560x0, 1.0, transform, 1

# ---------------------------------------------------------------------------
# Reference alternatives (commented out):
#
# Portrait (native, no rotation) for the small display:
# monitor = HDMI-A-1, 800x1280@60, 2560x0, 1.6
#
# Place small display on the LEFT instead of the right:
# monitor = HDMI-A-1, 800x1280@60, -800x0, 1.6, transform, 1
#
# Retina-class 2x displays (13" 2.8K, 27" 5K, 32" 6K):
# env = GDK_SCALE,2
# monitor=,preferred,auto,2

# ---------------------------------------------------------------------------
# Workspace binding. Keep the numbered desktops (1-9) on the primary Acer so
# workspace switching/scrolling behaves like virtual desktops instead of being
# split across the two monitors. The parking display gets its own dedicated
# workspace (10) so it stops stealing workspace 1.
workspace = 1,  monitor:DP-3, default:true
workspace = 2,  monitor:DP-3
workspace = 3,  monitor:DP-3
workspace = 4,  monitor:DP-3
workspace = 5,  monitor:DP-3
workspace = 6,  monitor:DP-3
workspace = 7,  monitor:DP-3
workspace = 8,  monitor:DP-3
workspace = 9,  monitor:DP-3
workspace = 10, monitor:HDMI-A-1, default:true
