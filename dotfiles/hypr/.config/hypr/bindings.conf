# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT ALT, M, Music TUI, exec, omarchy-launch-or-focus-tui cliamp
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Requested overrides
# SUPER + F was previously bound to fullscreen.
# SUPER + C was previously bound to universal copy.
# SUPER + L was previously bound to toggling the workspace layout.
# SUPER + P was previously bound to pseudo window.
# SUPER + = was previously bound to shrinking the active window.
unbind = SUPER, F
unbind = SUPER, C
unbind = SUPER, L
unbind = SUPER, P
unbind = SUPER, code:21
unbind = SUPER, Y
unbind = SUPER SHIFT, F
unbind = SUPER ALT SHIFT, F

bindd = SUPER, F, Files, exec, /home/oliver/.local/bin/omarchy-local-launch-native dolphin
bindd = SUPER SHIFT, F, Files, exec, /home/oliver/.local/bin/omarchy-local-launch-native dolphin
bindd = SUPER ALT SHIFT, F, Files (cwd), exec, /home/oliver/.local/bin/omarchy-local-launch-native dolphin "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, A, Open WebUI, exec, /home/oliver/.local/bin/omarchy-local-launch-native open-webui
bindd = SUPER, B, Browser, exec, omarchy-launch-browser
bindd = SUPER, C, Merkuro Calendar, exec, /home/oliver/.local/bin/omarchy-local-launch-native merkuro-calendar
bindd = SUPER ALT, C, Merkuro Contacts, exec, /home/oliver/.local/bin/omarchy-local-launch-native merkuro-contact
bindd = SUPER, E, KWrite, exec, /home/oliver/.local/bin/omarchy-local-launch-native kwrite
bindd = SUPER ALT, E, VS Code, exec, /home/oliver/.local/bin/omarchy-local-launch-native code
bindd = SUPER ALT, L, Lazyjournal, exec, omarchy-launch-or-focus-tui lazyjournal
bindd = SUPER, L, Lock screen, exec, omarchy-system-lock
bindd = SUPER, M, Proton Mail, exec, /home/oliver/.local/bin/omarchy-local-launch-native proton-mail
bindd = SUPER ALT, M, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER, N, Cohesion, exec, /home/oliver/.local/bin/omarchy-local-launch-native cohesion
bindd = SUPER, P, Proton Pass, exec, /home/oliver/.local/bin/omarchy-local-launch-native proton-pass
bindd = SUPER, Y, Yubico Authenticator, exec, /home/oliver/.local/bin/omarchy-local-launch-native yubico-authenticator
bindd = SUPER, Q, Force kill active app, exec, /home/oliver/.local/bin/omarchy-local-force-kill-active
bindd = SUPER, code:21, Omarchy menu, exec, omarchy-menu
